services:
  - type: web
    name: demo-pos-backend
    runtime: docker
    plan: free
    
    # Environment variables
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_PROFILES_ACTIVE
        value: default
    
    # Health check endpoint
    healthCheckPath: /swagger-ui.html
    healthCheckTimeout: 30
    
    # Auto-deploy on push to main
    autoDeploy: true
