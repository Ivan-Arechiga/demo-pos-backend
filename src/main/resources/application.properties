# Server Configuration
server.port=${PORT:8080}
spring.application.name=demo-pos-backend

# Database Configuration - Defaults to H2 for development/tests
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}
spring.datasource.username=${POSTGRES_USER:sa}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_URL:org.h2.Driver}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${DATABASE_URL:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${DATABASE_URL:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console (disabled in production)
spring.h2.console.enabled=${DATABASE_URL:false}

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.root=INFO
logging.level.com.democlass.pos=DEBUG
