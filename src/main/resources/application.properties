# Server Configuration
server.port=${PORT:8080}
spring.application.name=demo-pos-backend

# PostgreSQL Database Configuration (for production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/demo_pos}
spring.datasource.username=${POSTGRES_USER:demo_user}
spring.datasource.password=${POSTGRES_PASSWORD:demo_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console (disabled in production, only for development)
spring.h2.console.enabled=false

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.root=INFO
logging.level.com.democlass.pos=DEBUG
