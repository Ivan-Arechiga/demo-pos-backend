# Server Configuration
server.port=${PORT:8080}
spring.application.name=demo-pos-backend

# Database Configuration - Supports Coolify DB auto env + local H2
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:sa}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:${DATABASE_DRIVER:org.h2.Driver}}

# JPA/Hibernate Configuration (auto-detect DB when possible)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console (disabled by default)
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:false}

# OpenAPI / Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

# Logging
logging.level.root=INFO
logging.level.com.democlass.pos=DEBUG
